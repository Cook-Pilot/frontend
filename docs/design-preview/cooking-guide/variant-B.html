<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CookPilot — Warm Voice Coach</title>
  <style>
    :root {
      color-scheme: light;
      --cream: #fbf4e7;
      --cream-deep: #f3e5ce;
      --paper: #fffaf1;
      --orange: #c94f28;
      --orange-dark: #9f351a;
      --orange-soft: #f2c5ad;
      --cocoa: #34231f;
      --cocoa-mid: #6f554c;
      --line: #ddcbb8;
      --focus: #236c68;
      --shadow: 0 18px 50px rgba(77, 46, 30, .16);
      font-family: Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #e8ded0;
      color: var(--cocoa);
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
    }

    button {
      font: inherit;
      color: inherit;
    }

    button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    .app {
      width: min(100%, 390px);
      height: min(100dvh, 844px);
      min-height: 620px;
      overflow: hidden;
      background: var(--cream);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      position: relative;
    }

    .topbar {
      min-height: 72px;
      padding: max(17px, env(safe-area-inset-top)) 22px 12px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -.01em;
    }

    .brand-mark {
      width: 27px;
      height: 27px;
      border-radius: 50% 50% 45% 45%;
      display: grid;
      place-items: center;
      background: var(--orange);
      color: #fffaf2;
    }

    .brand-mark svg { width: 15px; height: 15px; }

    .recipe-meta {
      text-align: right;
      line-height: 1.25;
    }

    .recipe-name {
      display: block;
      font-size: 15px;
      font-weight: 800;
    }

    .progress-label {
      display: block;
      margin-top: 2px;
      color: var(--cocoa-mid);
      font-size: 12px;
      font-weight: 700;
    }

    main {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(166px, 1fr) auto;
    }

    .instruction {
      padding: 20px 24px 18px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--orange-dark);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .02em;
    }

    h1 {
      max-width: 330px;
      margin: 0;
      font-size: clamp(25px, 7.1vw, 30px);
      line-height: 1.28;
      letter-spacing: -.045em;
      text-wrap: balance;
    }

    .completion-cue {
      margin: 11px 0 0;
      color: var(--cocoa-mid);
      font-size: 14px;
      font-weight: 650;
      line-height: 1.45;
    }

    .voice-zone {
      min-height: 0;
      padding: 14px 24px 16px;
      background: var(--orange);
      color: #fffaf3;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-rows: auto auto 1fr;
      column-gap: 16px;
      align-items: center;
      border-top: 1px solid var(--orange-dark);
      border-bottom: 1px solid var(--orange-dark);
    }

    .voice-state {
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 850;
    }

    .listen-icon {
      width: 34px;
      height: 34px;
      border: 2px solid currentColor;
      border-radius: 50%;
      display: grid;
      place-items: center;
    }

    .listen-icon svg { width: 17px; height: 17px; }

    .timer {
      grid-column: 2;
      grid-row: 1 / span 2;
      font-variant-numeric: tabular-nums;
      font-size: clamp(46px, 13vw, 55px);
      font-weight: 750;
      line-height: 1;
      letter-spacing: -.055em;
    }

    .waveform {
      height: 54px;
      display: flex;
      align-items: center;
      gap: 5px;
      overflow: hidden;
    }

    .waveform span {
      width: 4px;
      height: var(--h);
      min-height: 8px;
      border-radius: 999px;
      background: currentColor;
      opacity: var(--o, .78);
      transform-origin: center;
      animation: listening 1.2s ease-in-out infinite alternate;
      animation-delay: var(--d, 0s);
    }

    @keyframes listening {
      from { transform: scaleY(.55); opacity: .56; }
      to { transform: scaleY(1); opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .waveform span { animation: none; }
    }

    .voice-helper {
      grid-column: 1 / -1;
      align-self: end;
      margin: 4px 0 0;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 250, 243, .42);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 650;
    }

    .fallback {
      padding: 16px 18px 14px;
    }

    .fallback-heading {
      margin: 0 0 10px 4px;
      color: var(--cocoa-mid);
      font-size: 12px;
      font-weight: 800;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .control {
      min-width: 0;
      min-height: 68px;
      padding: 8px 3px 7px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--paper);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 2px 0 rgba(87, 51, 37, .07);
    }

    .control svg {
      width: 21px;
      height: 21px;
      stroke-width: 2.2;
    }

    .control.next {
      border-color: var(--cocoa);
      background: var(--cocoa);
      color: #fffaf3;
    }

    .control:active { transform: translateY(1px); }

    .session-bar {
      min-height: 68px;
      padding: 10px 18px max(12px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: .82fr 1.18fr;
      gap: 10px;
      background: var(--cream-deep);
      border-top: 1px solid var(--line);
    }

    .session-action {
      min-height: 46px;
      border-radius: 13px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 850;
      cursor: pointer;
    }

    .stop {
      border: 1px solid transparent;
      background: transparent;
      color: var(--cocoa-mid);
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .complete {
      border: 1px solid var(--orange-dark);
      background: var(--orange);
      color: #fffaf3;
      box-shadow: 0 3px 0 var(--orange-dark);
    }

    @media (max-height: 735px) {
      .topbar { min-height: 60px; padding-top: max(10px, env(safe-area-inset-top)); }
      .instruction { padding-top: 13px; padding-bottom: 12px; }
      .instruction h1 { font-size: 24px; }
      .completion-cue { margin-top: 7px; }
      .voice-zone { min-height: 150px; padding-top: 8px; padding-bottom: 10px; }
      .waveform { height: 40px; }
      .fallback { padding-top: 10px; padding-bottom: 9px; }
      .control { min-height: 60px; }
      .session-bar { min-height: 60px; padding-top: 7px; padding-bottom: max(7px, env(safe-area-inset-bottom)); }
    }

    @media (min-width: 391px) {
      .app { border-radius: 30px; }
    }
  </style>
</head>
<body>
  <article class="app" aria-label="CookPilot 조리 화면">
    <header class="topbar">
      <div class="brand" aria-label="CookPilot">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M8 4v5a4 4 0 0 0 8 0V4M12 13v7M9 20h6"/>
          </svg>
        </span>
        <span>CookPilot</span>
      </div>
      <div class="recipe-meta">
        <strong class="recipe-name">라면</strong>
        <span class="progress-label">1 / 3 단계</span>
      </div>
    </header>

    <main>
      <section class="instruction" aria-labelledby="current-action">
        <p class="eyebrow">지금 할 일</p>
        <h1 id="current-action">물 500ml를 넣고 끓이세요.</h1>
        <p class="completion-cue">기포가 올라오면 다음 단계로 넘어가세요.</p>
      </section>

      <section class="voice-zone" aria-label="음성 코치 상태">
        <div class="voice-state" role="status" aria-live="polite">
          <span class="listen-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <rect x="8" y="3" width="8" height="12" rx="4"/>
              <path d="M5 11a7 7 0 0 0 14 0M12 18v3"/>
            </svg>
          </span>
          <span>듣는 중</span>
        </div>
        <time class="timer" datetime="PT2M14S" aria-label="남은 시간 2분 14초">02:14</time>
        <div class="waveform" aria-hidden="true">
          <span style="--h:18px;--d:-.6s"></span>
          <span style="--h:34px;--d:-.1s"></span>
          <span style="--h:24px;--d:-.8s"></span>
          <span style="--h:46px;--d:-.3s"></span>
          <span style="--h:30px;--d:-.7s"></span>
          <span style="--h:40px;--d:-.2s"></span>
          <span style="--h:21px;--d:-.5s"></span>
          <span style="--h:35px;--d:-.9s"></span>
          <span style="--h:15px;--d:-.4s"></span>
        </div>
        <p class="voice-helper">“다음”, “다시 말해줘”, “1분 더”라고 말해보세요.</p>
      </section>

      <nav class="fallback" aria-label="조리 단계 빠른 조작">
        <p class="fallback-heading">말하기 어렵다면 눌러주세요</p>
        <div class="control-grid">
          <button class="control" type="button" aria-label="이전 단계">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m14 17-5-5 5-5"/></svg>
            <span>이전</span>
          </button>
          <button class="control" type="button" aria-label="현재 안내 다시 듣기">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 1 0 2.3-5.7L4 8.6M4 4v4.6h4.6"/></svg>
            <span>다시 듣기</span>
          </button>
          <button class="control" type="button" aria-label="타이머에 1분 추가">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><circle cx="12" cy="12" r="8"/><path d="M12 8v8M8 12h8"/></svg>
            <span>1분 추가</span>
          </button>
          <button class="control next" type="button" aria-label="다음 단계">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m10 7 5 5-5 5"/></svg>
            <span>다음</span>
          </button>
        </div>
      </nav>
    </main>

    <footer class="session-bar" aria-label="조리 세션 조작">
      <button class="session-action stop" type="button">조리 중단</button>
      <button class="session-action complete" type="button">조리 완료</button>
    </footer>
  </article>
</body>
</html>
