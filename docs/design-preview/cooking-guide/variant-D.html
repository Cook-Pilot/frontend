<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>CookPilot — Balanced Kitchen Coach</title>
  <style>
    :root {
      color-scheme: light;
      --canvas: #f5f2eb;
      --surface: #fffdf8;
      --sage: #dfe8e1;
      --forest: #234f3d;
      --forest-deep: #17382b;
      --ink: #202622;
      --muted: #67716a;
      --line: #d5d9d2;
      --clay: #a94f3d;
      --focus: #245dcc;
      font-family: Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-width: 320px;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #dedfd9;
      color: var(--ink);
    }

    body { display: grid; place-items: center; }

    button {
      min-height: 44px;
      border: 0;
      font: inherit;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
      position: relative;
      z-index: 2;
    }

    button:active { transform: translateY(1px); }

    .app {
      width: min(100%, 390px);
      height: min(100dvh, 844px);
      min-height: 620px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto auto;
      overflow: hidden;
      background: var(--canvas);
      box-shadow: 0 18px 48px rgba(42, 47, 42, .14);
    }

    .topbar {
      min-height: 66px;
      padding: max(14px, env(safe-area-inset-top)) 20px 11px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .brand { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 850; }
    .brand-mark {
      width: 25px;
      height: 25px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--forest);
      color: #fff;
    }
    .brand-mark svg { width: 14px; height: 14px; }
    .recipe-meta { text-align: right; line-height: 1.22; }
    .recipe-name { display: block; font-size: 15px; font-weight: 850; }
    .progress-label { display: block; margin-top: 2px; color: var(--muted); font-size: 12px; font-weight: 700; }

    .instruction {
      padding: 20px 22px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 9px;
      color: var(--forest);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .02em;
    }

    .eyebrow::before {
      content: "1";
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--sage);
      font-size: 11px;
    }

    h1 {
      max-width: 345px;
      margin: 0;
      font-size: clamp(27px, 7.4vw, 31px);
      line-height: 1.22;
      letter-spacing: -.045em;
      word-break: keep-all;
    }

    .completion-cue {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      line-height: 1.42;
      word-break: keep-all;
    }

    .instrument {
      min-height: 0;
      padding: 18px 22px 16px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
      align-content: stretch;
      gap: 11px;
      background: var(--sage);
      border-bottom: 1px solid #c8d4cb;
    }

    .status-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .voice-state {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--forest-deep);
      font-size: 15px;
      font-weight: 850;
    }

    .mic {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid #9db4a5;
      border-radius: 50%;
      background: var(--surface);
    }
    .mic svg { width: 17px; height: 17px; }
    .live-dot { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 11px; font-weight: 750; }
    .live-dot::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--clay); }

    .timer-wrap { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .timer-label { color: var(--muted); font-size: 12px; font-weight: 750; }
    .timer {
      margin: 0;
      color: var(--forest-deep);
      font-family: "Segoe UI", Pretendard, sans-serif;
      font-size: clamp(72px, 22vw, 90px);
      font-weight: 760;
      line-height: .96;
      letter-spacing: -.075em;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .time-rule { height: 4px; background: #c5d1c8; overflow: hidden; }
    .time-rule::before { content: ""; display: block; width: 42%; height: 100%; background: var(--forest); }
    .voice-helper {
      margin: 0;
      color: #4f5e55;
      font-size: 12px;
      font-weight: 650;
      line-height: 1.4;
      word-break: keep-all;
    }

    .fallback {
      padding: 14px 18px 13px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }
    .fallback-heading { margin: 0 2px 9px; color: var(--muted); font-size: 11px; font-weight: 800; }
    .secondary-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-bottom: 8px; }
    .secondary {
      min-width: 0;
      min-height: 46px;
      padding: 0 6px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--canvas);
      color: #3f4741;
      font-size: 12px;
      font-weight: 750;
    }
    .next {
      width: 100%;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border-radius: 10px;
      background: var(--forest);
      color: #fff;
      font-size: 15px;
      font-weight: 850;
      box-shadow: 0 3px 0 var(--forest-deep);
    }
    .next svg { width: 18px; height: 18px; }

    .session-bar {
      min-height: 64px;
      padding: 8px 18px max(10px, env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      background: var(--canvas);
    }
    .session-action { min-height: 44px; border-radius: 9px; font-size: 13px; font-weight: 800; }
    .stop { background: transparent; color: var(--muted); }
    .complete { border: 1px solid #c8cec8; background: var(--surface); color: var(--forest-deep); }

    @media (max-height: 720px) {
      .topbar { min-height: 58px; padding-top: max(9px, env(safe-area-inset-top)); }
      .instruction { padding-top: 13px; padding-bottom: 12px; }
      .instruction h1 { font-size: 25px; }
      .completion-cue { margin-top: 7px; }
      .instrument { padding-top: 10px; padding-bottom: 10px; gap: 7px; }
      .timer { font-size: 68px; }
      .fallback { padding-top: 9px; padding-bottom: 8px; }
      .secondary { min-height: 44px; }
      .next { min-height: 46px; }
      .session-bar { min-height: 56px; padding-top: 6px; padding-bottom: max(6px, env(safe-area-inset-bottom)); }
    }

    @media (min-width: 391px) { .app { border-radius: 28px; } }
  </style>
</head>
<body>
  <article class="app" aria-label="CookPilot 조리 화면">
    <header class="topbar">
      <div class="brand" aria-label="CookPilot">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M8 4v5a4 4 0 0 0 8 0V4M12 13v7M9 20h6"/></svg>
        </span>
        <span>CookPilot</span>
      </div>
      <div class="recipe-meta">
        <strong class="recipe-name">라면</strong>
        <span class="progress-label">1 / 3 단계</span>
      </div>
    </header>

    <section class="instruction" aria-labelledby="current-action-d">
      <p class="eyebrow">지금 할 일</p>
      <h1 id="current-action-d">물 500ml를 넣고 끓이세요.</h1>
      <p class="completion-cue">기포가 올라오면 다음 단계로 넘어가세요.</p>
    </section>

    <section class="instrument" aria-label="타이머와 음성 코치 상태">
      <div class="status-row">
        <div class="voice-state" role="status" aria-live="polite">
          <span class="mic" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="8" y="3" width="8" height="12" rx="4"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>
          </span>
          <span>듣는 중</span>
        </div>
        <span class="live-dot">음성 인식 중</span>
      </div>
      <div class="timer-wrap">
        <span class="timer-label">남은 시간</span>
        <time class="timer" datetime="PT2M14S" aria-label="남은 시간 2분 14초">02:14</time>
      </div>
      <div class="time-rule" aria-hidden="true"></div>
      <p class="voice-helper">“다음”, “다시 말해줘”, “1분 더”라고 말해보세요.</p>
    </section>

    <nav class="fallback" aria-label="조리 단계 빠른 조작">
      <p class="fallback-heading">말하기 어렵다면 눌러주세요</p>
      <div class="secondary-actions">
        <button class="secondary" type="button" aria-label="이전 단계">이전</button>
        <button class="secondary" type="button" aria-label="현재 안내 다시 듣기">다시 듣기</button>
        <button class="secondary" type="button" aria-label="타이머에 1분 추가">1분 추가</button>
      </div>
      <button class="next" type="button" aria-label="다음 단계">
        <span>다음 단계</span>
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m10 7 5 5-5 5"/></svg>
      </button>
    </nav>

    <footer class="session-bar" aria-label="조리 세션 조작">
      <button class="session-action stop" type="button">조리 중단</button>
      <button class="session-action complete" type="button">조리 완료</button>
    </footer>
  </article>
</body>
</html>
