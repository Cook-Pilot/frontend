<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f1e8">
  <title>CookPilot — Calm Recipe Journal</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f5f1e8;
      --paper-deep: #ebe5d8;
      --ink: #17382c;
      --ink-soft: #52675d;
      --line: #c9c5b9;
      --tomato: #bd4637;
      --tomato-dark: #93352b;
      --white: #fffdf7;
      --serif: Georgia, "Times New Roman", serif;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-width: 320px;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #d8d4ca;
    }

    body {
      display: grid;
      place-items: center;
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    button {
      min-width: 44px;
      min-height: 44px;
      border: 0;
      border-radius: 0;
      font: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:focus-visible {
      outline: 3px solid var(--tomato);
      outline-offset: 3px;
    }

    button:active { transform: translateY(1px); }

    .app {
      width: min(100%, 390px);
      height: 100svh;
      max-height: 844px;
      min-height: 620px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
      overflow: hidden;
      background: var(--paper);
      box-shadow: 0 18px 60px rgb(26 47 39 / 20%);
      padding: max(14px, env(safe-area-inset-top)) 18px max(12px, env(safe-area-inset-bottom));
    }

    .topbar {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin: 0;
      font-family: var(--serif);
      font-size: 18px;
      letter-spacing: -.02em;
    }

    .brand-mark {
      width: 8px;
      height: 8px;
      display: inline-block;
      border-radius: 50%;
      background: var(--tomato);
    }

    .recipe {
      color: var(--ink-soft);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .08em;
    }

    .cooking-layout {
      min-height: 0;
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: 15px;
      padding: 22px 0 13px;
    }

    .stage-rail {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 4px;
    }

    .stage-rail::before {
      content: "";
      position: absolute;
      top: 18px;
      bottom: 18px;
      left: 50%;
      width: 1px;
      background: var(--line);
      transform: translateX(-50%);
    }

    .stage {
      position: relative;
      z-index: 1;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      margin-bottom: 92px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--paper);
      color: var(--ink-soft);
      font-family: var(--serif);
      font-size: 13px;
    }

    .stage:last-child { margin-bottom: 0; }

    .stage[aria-current="step"] {
      border-color: var(--ink);
      background: var(--ink);
      color: var(--white);
      box-shadow: 0 0 0 5px var(--paper), 0 0 0 6px var(--ink);
    }

    .content {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      color: var(--tomato-dark);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .instruction {
      max-width: 280px;
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(30px, 8.2vw, 36px);
      font-weight: 400;
      line-height: 1.14;
      letter-spacing: -.045em;
      text-wrap: balance;
    }

    .completion-cue {
      margin: 12px 0 0;
      padding-left: 12px;
      border-left: 3px solid var(--tomato);
      color: var(--ink-soft);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.45;
    }

    .timer-field {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 12px;
      margin-top: auto;
      padding: 15px 0 12px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .field-label {
      display: block;
      margin-bottom: 3px;
      color: var(--ink-soft);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .13em;
    }

    .timer {
      font-family: var(--serif);
      font-size: clamp(66px, 19vw, 78px);
      font-variant-numeric: tabular-nums lining-nums;
      font-weight: 400;
      line-height: .9;
      letter-spacing: -.07em;
    }

    .timer-caption {
      padding-bottom: 4px;
      color: var(--tomato-dark);
      font-size: 12px;
      font-weight: 800;
      writing-mode: vertical-rl;
    }

    .voice-field {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: center;
      padding: 13px 0 4px;
    }

    .waveform {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border: 1px solid var(--ink);
      border-radius: 50%;
    }

    .waveform span {
      width: 3px;
      height: 12px;
      border-radius: 2px;
      background: var(--tomato);
      animation: listen 1.1s ease-in-out infinite;
    }

    .waveform span:nth-child(2) { height: 22px; animation-delay: -.35s; }
    .waveform span:nth-child(3) { height: 16px; animation-delay: -.7s; }
    .waveform span:nth-child(4) { height: 25px; animation-delay: -.2s; }
    .waveform span:nth-child(5) { height: 10px; animation-delay: -.55s; }

    @keyframes listen {
      0%, 100% { transform: scaleY(.55); }
      50% { transform: scaleY(1); }
    }

    .voice-copy strong {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 3px;
      font-size: 16px;
    }

    .voice-copy strong::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--tomato);
    }

    .voice-copy p {
      margin: 0;
      color: var(--ink-soft);
      font-size: 12px;
      line-height: 1.45;
    }

    .fallbacks {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      padding: 8px 0;
      border-top: 1px solid var(--line);
    }

    .action {
      min-height: 58px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border: 1px solid var(--ink);
      background: transparent;
      color: var(--ink);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.1;
    }

    .action .symbol {
      font-family: var(--serif);
      font-size: 21px;
      font-weight: 400;
      line-height: 1;
    }

    .action.primary {
      background: var(--ink);
      color: var(--white);
    }

    .session-actions {
      display: grid;
      grid-template-columns: 1fr 1.35fr;
      gap: 8px;
    }

    .session-actions button {
      min-height: 47px;
      font-size: 14px;
      font-weight: 800;
    }

    .stop {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink-soft);
    }

    .complete {
      background: var(--tomato);
      color: var(--white);
    }

    .complete:hover { background: var(--tomato-dark); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
      }
    }

    @media (max-height: 730px) {
      .app { padding-top: 8px; padding-bottom: 8px; }
      .topbar { min-height: 44px; }
      .cooking-layout { padding-top: 13px; padding-bottom: 7px; }
      .instruction { font-size: 28px; }
      .completion-cue { margin-top: 7px; }
      .timer-field { padding: 9px 0; }
      .timer { font-size: 58px; }
      .voice-field { padding-top: 8px; }
      .voice-copy p { font-size: 11px; }
      .fallbacks { padding: 6px 0; }
      .action { min-height: 50px; }
      .session-actions button { min-height: 44px; }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="CookPilot 라면 조리 화면">
    <header class="topbar">
      <h1 class="brand"><span class="brand-mark" aria-hidden="true"></span>CookPilot</h1>
      <span class="recipe">라면 · 조리 중</span>
    </header>

    <section class="cooking-layout" aria-labelledby="current-step">
      <nav class="stage-rail" aria-label="레시피 진행 단계">
        <span class="stage" aria-current="step" aria-label="현재 단계 1">1</span>
        <span class="stage" aria-label="단계 2">2</span>
        <span class="stage" aria-label="단계 3">3</span>
      </nav>

      <div class="content">
        <div class="eyebrow">
          <span>현재 단계</span>
          <span>1 / 3</span>
        </div>
        <h2 class="instruction" id="current-step">물 500ml를 넣고 끓이세요.</h2>
        <p class="completion-cue">기포가 올라오면 다음 단계로 넘어가세요.</p>

        <section class="timer-field" aria-label="남은 시간 2분 14초">
          <div>
            <span class="field-label">남은 시간</span>
            <div class="timer" role="timer" aria-live="off">02:14</div>
          </div>
          <span class="timer-caption">끓이기</span>
        </section>

        <section class="voice-field" aria-labelledby="voice-status">
          <div class="waveform" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="voice-copy">
            <span class="field-label">음성 상태</span>
            <strong id="voice-status" aria-live="polite">듣는 중</strong>
            <p>“다음”, “다시 말해줘”, “1분 더”라고 말해보세요.</p>
          </div>
        </section>
      </div>
    </section>

    <nav class="fallbacks" aria-label="조리 빠른 조작">
      <button class="action" type="button" aria-label="이전 단계">
        <span class="symbol" aria-hidden="true">←</span><span>이전</span>
      </button>
      <button class="action" type="button" aria-label="현재 안내 다시 듣기">
        <span class="symbol" aria-hidden="true">↻</span><span>다시 듣기</span>
      </button>
      <button class="action" type="button" aria-label="타이머 1분 추가">
        <span class="symbol" aria-hidden="true">+1′</span><span>1분 추가</span>
      </button>
      <button class="action primary" type="button" aria-label="다음 단계">
        <span class="symbol" aria-hidden="true">→</span><span>다음</span>
      </button>
    </nav>

    <footer class="session-actions">
      <button class="stop" type="button">조리 중단</button>
      <button class="complete" type="button">조리 완료</button>
    </footer>
  </main>
</body>
</html>
